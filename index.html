<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DES Studio</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      *:focus-visible { outline: 2px solid #06b6d4; outline-offset: 2px; border-radius: 3px; }
    </style>
    <script>
      (function() {
        var t = localStorage.getItem('des.themeId') || 'system';
        var resolved = t;
        if (t === 'system') {
          resolved = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches
            ? 'dark' : 'light';
        }
        document.body.style.background = {
          'light': '#f0f4f8',
          'high-contrast-dark': '#000000'
        }[resolved] || '#080c10';
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
